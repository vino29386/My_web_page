<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Online Store</title>
  <link rel="stylesheet" href="style.css">
  <!-- Ionicons for icons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>

  <!-- ===== Header / Topbar ===== -->
  <header class="topbar">
    <div class="logo">MyStore</div>
    <!-- Hamburger button -->
  <button class="menu-toggle">
    <ion-icon name="menu-outline"></ion-icon>
  </button>

    <nav class="navbar">
      <a href="home.html">Home</a>
      <a href="products.html">Products</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="user-actions">
      <a href="wishlist.html" class="wishlist-link">
        <ion-icon name="heart-outline"></ion-icon> Wishlist 
        <span id="wishlist-count">0</span>
      </a>
      <a href="cart.html" class="cart-link">
        <ion-icon name="cart-outline"></ion-icon> Cart 
        <span id="cart-count">0</span>
      </a>
      <a href="login.html">
        <ion-icon name="person-outline"></ion-icon> Login
      </a>
    </div>
  </header>

  <!-- ===== Search Bar ===== -->
  <section class="searchbar">
    <input type="text" placeholder="Search products...">
    <button>Search</button>
  </section>

  <!-- ===== Product Grid ===== -->
  <section class="product-grid">
    <div class="product-card">
      <img src="shoe1.jpg" alt="Shoe 1">
      <h3>Running Shoes</h3>
      <p>$59.99</p>
      <a href="product-detail.html">View Details</a>
    </div>
    <div class="product-card">
      <img src="shoe2.jpg" alt="Shoe 2">
      <h3>Casual Sneakers</h3>
      <p>$49.99</p>
      <a href="product-detail.html">View Details</a>
    </div>
    <div class="product-card">
      <img src="shoe3.jpg" alt="Shoe 3">
      <h3>Leather Boots</h3>
      <p>$89.99</p>
      <a href="product-detail.html">View Details</a>
    </div>
    <div class="product-card">
      <img src="shoe4.jpg" alt="Shoe 4">
      <h3>Sport Trainers</h3>
      <p>$69.99</p>
      <a href="product-detail.html">View Details</a>
    </div>
  </section>
  <div class="product-card">
    <img src="shoe5.jpg" alt="Shoe 4">
      <h3>Nike Air Force 1 Color Block</h3>
    <a href="product-detail.html">View details</a>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <p>&copy; 2026 MyStore. All rights reserved.</p>
    <div class="icons">
      <a href="#"><ion-icon name="logo-facebook"></ion-icon></a>
      <a href="#"><ion-icon name="logo-twitter"></ion-icon></a>
      <a href="#"><ion-icon name="logo-instagram"></ion-icon></a>
    </div>
  </footer>

</body>
</html>
